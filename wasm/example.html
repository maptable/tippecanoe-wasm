<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tippecanoe WASM Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .input-section,
        .options-section {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
        }

        .file-upload-area {
            border: 2px dashed #ccc;
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            margin: 10px 0;
        }

        .file-upload-area:hover {
            border-color: #4CAF50;
        }

        input[type="file"] {
            margin: 10px 0;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
        }

        .loading {
            background-color: #e2f3f5;
            color: #0c5460;
        }

        .progress-bar {
            height: 20px;
            background-color: #ddd;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress {
            height: 100%;
            background-color: #4CAF50;
            width: 0%;
            transition: width 0.3s;
        }

        .log-container {
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            background-color: #f9f9f9;
        }

        .progress-text {
            margin-top: 5px;
            text-align: center;
            font-size: 14px;
            color: #333;
        }

        .metadata-section {
            margin-top: 20px;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }

        .metadata-json {
            width: 100%;
            background-color: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            white-space: pre-wrap;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <h1>Tippecanoe WASM Converter</h1>

    <div class="container">
        <div class="input-section">
            <h2>Input GeoJSON</h2>
            <div class="file-upload-area">
                <p>Select a GeoJSON file to convert:</p>
                <input type="file" id="geojson-file" accept=".geojson,.json" title="Select GeoJSON file"
                    aria-label="Select GeoJSON file">
            </div>
        </div>

        <div class="options-section">
            <h2>Conversion Options</h2>

            <label for="output-format">Output Format:</label>
            <select id="output-format">
                <option value="pmtiles">PMTiles</option>
                <option value="mbtiles">MBTiles</option>
            </select>

            <label for="additional-args">Arguments:</label>
            <input type="text" id="additional-args"
                value="-zg --force --detect-shared-borders --visvalingam --simplification=10 --simplify-only-low-zooms --coalesce-densest-as-needed --coalesce --reorder --no-line-simplification --extend-zooms-if-still-dropping"
                placeholder="-z14 -Z0 --layer=mylayer --drop-smallest-as-needed">

            <button id="convert-btn">Convert</button>
            <button id="download-btn" disabled>Download Result</button>

            <div class="progress-bar" id="progress-container" style="display: none;">
                <div class="progress" id="progress-bar"></div>
            </div>
            <div class="progress-text" id="progress-text"></div>

            <div id="status" class="status"></div>

            <div id="metadata-section" class="metadata-section" style="display: none;">
                <h2>Metadata</h2>
                <pre id="metadata-json" class="metadata-json"></pre>
            </div>

            <div class="log-container" id="log-container"></div>
        </div>
    </div>

    <script>
        let tippecanoe;
        let resultBuffer = null;
        let fileName = "output";

        // Load the WASM module
        async function loadWasmModule() {
            try {
                updateStatus("Loading WASM module...", "loading");

                await loadScript("tippecanoe_wasm.js");

                updateStatus("Initializing WASM module...", "loading");

                const moduleConfig = {
                    print: text => console.log('[WASM stdout]:', text),
                    printErr: text => console.error('[WASM stderr]:', text),

                    locateFile: (file, path) => {
                        if (file.endsWith('.wasm')) {
                            console.log("Locating WASM file...", path, file);
                        }
                        return path + file;
                    },

                    noFSInit: false,

                    INITIAL_MEMORY: 256 * 1024 * 1024,
                    ALLOW_MEMORY_GROWTH: true,

                    EXPORTED_RUNTIME_METHODS: ['FS', 'ccall', 'cwrap', 'UTF8ToString', 'stringToNewUTF8'],

                    onRuntimeInitialized: () => {
                        console.log("WASM Runtime fully initialized");
                    }
                };

                console.log("Creating module with configuration...");
                try {
                    const module = await createTippecanoeModule(moduleConfig);

                    console.log("Module created, checking properties...");
                    console.log("- FS available:", typeof module.FS !== 'undefined');

                    if (typeof module.createTippecanoeInterface !== 'function') {
                        console.error("Interface not found on module. Available methods:",
                            Object.keys(module).filter(k => typeof module[k] === 'function'));
                        throw new Error("Required interface 'createTippecanoeInterface' not found");
                    }

                    tippecanoe = module.createTippecanoeInterface();

                    // Set up progress reporting
                    tippecanoe.setProgressCallback(handleProgressUpdate);

                    if (!tippecanoe.isReady()) {
                        console.error("Filesystem not ready, FS object:", module.FS);
                        throw new Error("Filesystem initialization failed");
                    }

                    updateStatus("WASM module loaded successfully", "success");
                    document.getElementById("convert-btn").disabled = false;
                } catch (error) {
                    console.error("Module creation failed:", error);
                    throw error;
                }
            } catch (error) {
                console.error("Module initialization error:", error);
                updateStatus("Failed to load WASM module: " + error, "error");
            }
        }

        // Handle progress updates from the WASM module
        function handleProgressUpdate(progress, step, message) {
            console.log(`${step}, ${message}, ${progress}${step === 2 ? 'M' : '%'}`);

            const progressBar = document.getElementById("progress-bar");
            const progressText = document.getElementById("progress-text");
            const progressContainer = document.getElementById("progress-container");
            const logContainer = document.getElementById("log-container");

            // Ensure progress container is visible
            progressContainer.style.display = "block";

            if (progress >= 0 && progress <= 100) {
                // Update progress bar for percentage-based progress
                progressBar.style.width = `${progress} % `;
                progressText.textContent = `${progress} %: ${message}`;
            } else if (progress === -1) {
                // Log message for non-percentage informational updates
                const logEntry = document.createElement("div");
                logEntry.textContent = message;
                logContainer.appendChild(logEntry);

                // Auto-scroll to bottom
                logContainer.scrollTop = logContainer.scrollHeight;
            }
        }

        // Helper function to load scripts
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.body.appendChild(script);
            });
        }

        // Handle file input
        document.getElementById("convert-btn").addEventListener("click", async function () {
            const fileInput = document.getElementById("geojson-file");
            if (!fileInput.files || fileInput.files.length === 0) {
                updateStatus("Please select a GeoJSON file", "error");
                return;
            }

            // Check if module is ready
            if (!tippecanoe || !tippecanoe.isReady()) {
                updateStatus("WASM module not ready. Please wait or reload the page.", "error");
                return;
            }

            try {
                const file = fileInput.files[0];
                fileName = file.name.split(".")[0];

                // Read file content
                const fileContent = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.onerror = reject;
                    reader.readAsText(file);
                });

                // Double check filesystem readiness with more detailed error reporting
                if (!tippecanoe) {
                    updateStatus("WASM module not initialized. Please reload the page.", "error");
                    return;
                }

                const fsReady = tippecanoe.isReady();
                console.log("File system ready check:", fsReady);

                if (!fsReady) {
                    // Try to diagnose the issue
                    let diagnosticMsg = "WASM filesystem not ready. ";

                    if (typeof tippecanoe.init === 'function') {
                        try {
                            await tippecanoe.init();
                            diagnosticMsg += "Initialization attempt made. ";
                        } catch (e) {
                            diagnosticMsg += "Init failed: " + e.message + ". ";
                        }
                    }

                    updateStatus(diagnosticMsg + "Please reload the page.", "error");
                    return;
                }

                // Prepare arguments
                const outputFormat = document.getElementById("output-format").value;
                const additionalArgs = document.getElementById("additional-args").value;

                // Show progress
                document.getElementById("progress-container").style.display = "block";
                document.getElementById("progress-bar").style.width = "0%";
                document.getElementById("progress-text").textContent = "Starting conversion...";

                // Clear log container
                document.getElementById("log-container").innerHTML = "";

                updateStatus("Converting GeoJSON... This may take a while for large files.", "loading");

                // Disable UI
                document.getElementById("convert-btn").disabled = true;

                // Process the GeoJSON
                resultBuffer = await tippecanoe.processGeoJSON(fileContent, outputFormat, additionalArgs.trim());

                // Check for error (if number is returned)
                if (typeof resultBuffer === 'number') {
                    updateStatus(`Conversion failed with error code: ${resultBuffer} `, "error");
                    document.getElementById("convert-btn").disabled = false;
                    document.getElementById("download-btn").disabled = true;
                    document.getElementById("metadata-section").style.display = "none";
                } else {
                    updateStatus("Conversion completed successfully!", "success");
                    document.getElementById("download-btn").disabled = false;
                    document.getElementById("convert-btn").disabled = false;

                    displayMetadata();
                }
            } catch (error) {
                console.error("Conversion error:", error);
                updateStatus("Error during conversion: " + error.message, "error");
                document.getElementById("convert-btn").disabled = false;
                document.getElementById("metadata-section").style.display = "none";
            }
        });

        // Format file size in human readable format
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + " B";
            else if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + " KB";
            else if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(2) + " MB";
            else return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
        }

        // Display metadata
        function displayMetadata() {
            try {
                const metadata = tippecanoe.getLastMetadata();

                if (!metadata) {
                    console.warn("No metadata available");
                    document.getElementById("metadata-section").style.display = "none";
                    return;
                }

                const metadataJson = document.getElementById("metadata-json");
                metadataJson.textContent = JSON.stringify(metadata, null, 2);

                document.getElementById("metadata-section").style.display = "block";
            } catch (error) {
                console.error("Error displaying metadata:", error);
            }
        }

        // Handle download button click
        document.getElementById("download-btn").addEventListener("click", function () {
            if (!resultBuffer || typeof resultBuffer === 'number') {
                updateStatus("No valid conversion result to download", "error");
                return;
            }

            const outputFormat = document.getElementById("output-format").value;
            const extension = outputFormat === "mbtiles" ? "mbtiles" : "pmtiles";

            // Show file size information
            const fileSize = resultBuffer.byteLength;
            updateStatus(`Preparing download(${formatFileSize(fileSize)})...`, "loading");

            // Show progress container
            document.getElementById("progress-container").style.display = "block";
            document.getElementById("progress-bar").style.width = "0%";

            try {
                // Create a Blob from the buffer
                const blob = new Blob([resultBuffer], { type: "application/octet-stream" });

                // For smaller files, use direct download
                if (fileSize < 100 * 1024 * 1024) { // Less than 100MB
                    // Create download link
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `${fileName}.${extension} `;
                    document.body.appendChild(a);

                    // Download with progress simulation
                    simulateDownloadProgress();

                    // Trigger download
                    a.click();

                    // Clean up
                    setTimeout(function () {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                        updateStatus(`File downloaded successfully: ${fileName}.${extension} (${formatFileSize(fileSize)})`, "success");
                        document.getElementById("progress-container").style.display = "none";
                    }, 1500);
                } else {
                    // For larger files, use saveAs dialog if available (optional FileSaver.js approach)
                    if (typeof saveAs !== 'undefined') {
                        updateStatus(`Preparing large file(${formatFileSize(fileSize)})...`, "loading");
                        simulateDownloadProgress();
                        saveAs(blob, `${fileName}.${extension} `);
                        setTimeout(function () {
                            updateStatus(`Large file download initiated: ${fileName}.${extension} (${formatFileSize(fileSize)})`, "success");
                            document.getElementById("progress-container").style.display = "none";
                        }, 2000);
                    } else {
                        // Fallback for large files
                        const url = URL.createObjectURL(blob);

                        updateStatus(`Opening save dialog for large file(${formatFileSize(fileSize)})...`, "loading");
                        simulateDownloadProgress();

                        // Try to use browser's save dialog
                        const a = document.createElement("a");
                        a.href = url;
                        a.download = `${fileName}.${extension} `;
                        a.target = "_blank";
                        document.body.appendChild(a);
                        a.click();

                        // Clean up
                        setTimeout(function () {
                            document.body.removeChild(a);
                            window.URL.revokeObjectURL(url);
                            updateStatus(`Large file download initiated: ${fileName}.${extension} (${formatFileSize(fileSize)})`, "success");
                            document.getElementById("progress-container").style.display = "none";
                        }, 2000);
                    }
                }
            } catch (error) {
                console.error("Download error:", error);
                updateStatus(`Error initiating download: ${error.message}`, "error");
                document.getElementById("progress-container").style.display = "none";
            }
        });

        // Simulate download progress
        function simulateDownloadProgress() {
            const progressBar = document.getElementById("progress-bar");
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                } else {
                    width += (100 - width) / 10; // Accelerating progress simulation
                    progressBar.style.width = width + "%";
                }
            }, 100);

            // Ensure we reach 100% after a reasonable time
            setTimeout(() => {
                progressBar.style.width = "100%";
                clearInterval(interval);
            }, 1500);
        }

        // Update status message
        function updateStatus(message, type) {
            const statusElement = document.getElementById("status");
            statusElement.textContent = message;
            statusElement.className = "status " + type;
        }

        // Initialize
        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("convert-btn").disabled = true;
            updateStatus("Loading WASM module...", "loading");
            loadWasmModule();
        });
    </script>
</body>

</html>
